<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>صاصا ❤️ شوشو</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #1a0033, #ff4d6d);
  color: white;
}

.container { margin-top: 60px; }

.names { font-size: 34px; }

.heart-frame {
  width: 280px;
  height: 280px;
  margin: 20px auto;
  animation: beat 1.2s infinite;
}

.heart-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  clip-path: path("M140 260 L20 140 A60 60 0 0 1 140 50 A60 60 0 0 1 260 140 Z");
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

#counter {
  margin-top: 20px;
  font-size: 24px;
  background: rgba(255,255,255,0.15);
  padding: 15px 25px;
  border-radius: 15px;
  display: inline-block;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
}

#loveMessage { display: none; margin-top: 20px; }
</style>
</head>

<body>

<script>
let password = prompt("ادخل الباسورد ❤️");
if (password !== "17/3/2005") {
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>❌ باسورد غلط</h1>";
}
</script>

<div class="container">
<div class="names">صاصا ❤️ شوشو</div>

<div class="heart-frame">
  <img src="love.jpg">
</div>

<div id="counter"></div>

<br>

<button onclick="toggleMusic()">🎵 موسيقى</button>
<button onclick="showMessage()">💌 رسالة</button>
<button onclick="surprise()">😏 مفاجأة</button>

<div id="loveMessage">
من يوم 14/12/2023 ❤️<br>
وأنا بحبك أكتر كل يوم 💖
</div>

</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
const startDate = new Date("2023-12-14T00:00:00");

function updateCounter() {
  const now = new Date();
  const diff = now - startDate;

  const seconds = Math.floor(diff / 1000);
  const days = Math.floor(seconds / (3600 * 24));
  const hours = Math.floor((seconds % (3600 * 24)) / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const sec = seconds % 60;

  document.getElementById("counter").innerHTML =
    `${days} يوم 💖<br>
     ${hours} ساعة ⏳<br>
     ${minutes} دقيقة ⏰<br>
     ${sec} ثانية ⏱️`;
}

setInterval(updateCounter, 1000);
updateCounter();

const music = document.getElementById("music");

function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}

function showMessage() {
  document.getElementById("loveMessage").style.display = "block";
}

function surprise() {
  alert("أنتي أحلى حاجة حصلتلي ❤️");
}
</script>

</body>
</html>
